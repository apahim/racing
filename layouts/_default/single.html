{{ define "main" }}
<article class="max-w-4xl mx-auto px-6 py-20">
  <header class="mb-16">
    {{ with .Params.label }}
      <span class="section-label">{{ . }}</span>
    {{ end }}
    <h1 class="font-mono text-3xl md:text-4xl font-bold text-white mb-4">{{ .Title }}</h1>
    {{ with .Params.subtitle }}
      <p class="text-slate text-lg max-w-2xl">{{ . }}</p>
    {{ end }}
  </header>

  <div class="prose prose-invert prose-lg max-w-none
              prose-headings:font-mono prose-headings:tracking-wide
              prose-h2:text-xl prose-h2:text-white prose-h2:mt-16 prose-h2:mb-6
              prose-h3:text-lg prose-h3:text-slate
              prose-p:text-slate prose-p:leading-relaxed
              prose-a:text-accent prose-a:no-underline hover:prose-a:underline
              prose-strong:text-white
              prose-code:text-accent prose-code:bg-surface prose-code:px-1.5 prose-code:py-0.5 prose-code:rounded prose-code:text-sm
              prose-li:text-slate
              prose-table:border-subtle prose-th:text-white prose-th:font-mono prose-th:text-sm
              prose-td:text-slate prose-td:border-subtle">
    {{ .Content }}
  </div>
</article>
{{ end }}
